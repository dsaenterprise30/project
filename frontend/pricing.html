<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pricing</title>
  <script>
    if (typeof window.API_BASE_URL === 'undefined') {
        const isLocal = 
            window.location.hostname === 'localhost' || 
            window.location.hostname === '127.0.0.1' || 
            window.location.hostname === '[::1]' || 
            window.location.hostname.startsWith('192.168.') || 
            window.location.hostname.startsWith('10.') || 
            window.location.hostname.startsWith('172.') ||
            window.location.hostname.endsWith('.local') ||
            window.location.hostname === '' ||
            window.location.protocol === 'file:';
        
        const proto = (window.location.protocol === 'file:' || window.location.protocol === 'http:') ? 'http:' : window.location.protocol;
        const host = window.location.hostname || 'localhost';
        
        window.API_BASE_URL = isLocal 
            ? `${proto}//${host}:3000` 
            : "https://project-tbbc.onrender.com";
    }
  </script>

  <!-- Razorpay Checkout -->
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

  <!-- ================= CSS ================= -->
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f6f6f6;
      margin: 0;
      padding: 80px 0 0 0;
      /* reserve space for fixed navbar (adjusted for larger logo) */
      text-align: center;
    }

    :root {
      --primary-blue: #1e3a8a;
      --secondary-blue: #3b82f6;
      --bg-white: #fff;
    }

    /* --- Navbar Styles (aligned with other pages) --- */
    .navbar {
      background: var(--primary-blue);
      padding: 0.9rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
      gap: 1rem;
    }

    .navbar .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      color: #fff;
      font-family: "Caprasimo", serif;
      font-size: 24px;
      /* increased for better visibility */
      font-weight: 400;
      cursor: pointer;
    }

    .navbar .logo a {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      text-decoration: none;
      color: inherit;
    }

    .navbar .logo i {
      font-size: 18px;
      color: #fff;
      padding: 6px 8px;
      border-radius: 6px;
      transition: background 0.2s, transform 0.15s;
      background: transparent;
      cursor: pointer;
    }

    .navbar .logo i:hover {
      background: rgba(255, 255, 255, 0.06);
      transform: translateY(-1px);
    }

    .navbar .logo img {
      width: 48px;
      /* slightly larger to match text */
      height: 48px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.06);
      object-fit: cover;
    }

    .navbar .logo span {
      color: #fff;
      font-weight: 700;
      font-size: 1.2rem;
      /* increased to match larger logo */
    }

    @media (max-width: 768px) {
      .navbar {
        padding: 0.75rem 1rem;
      }

      .navbar .logo span {
        display: none;
      }
    }

    h1 {
      margin-top: 40px;
    }

    .btn {
      width: 100%;
      padding: 0.75rem;
      background: var(--primary-blue);
      color: white;
      font-size: 1rem;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 1rem;
      transition: background 0.3s;
    }

    .btn:hover {
      background: var(--secondary-blue);
    }

    .plans-container {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 40px;
      flex-wrap: wrap;
      padding: 0 16px;
      align-items: stretch;
    }

    .plan-card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 25px;
      width: 260px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
      position: relative;
    }

    .badge {
      position: absolute;
      top: -10px;
      right: -10px;
      background: #ff9800;
      color: #fff;
      padding: 6px 10px;
      font-size: 12px;
      border-radius: 20px;
    }

    .plan-price {
      font-size: 26px;
      margin: 15px 0;
    }

    .price-block {
      display: flex;
      align-items: baseline;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .original-price {
      text-decoration: line-through;
      color: #888;
      font-size: 0.95rem;
    }

    .discounted-price {
      color: #111;
      font-weight: 700;
      font-size: 1.15rem;
    }

    .price-interval {
      color: #666;
      font-size: 0.95rem;
      margin-left: 4px;
    }

    .promo-text {
      color: #047857;
      /* green */
      font-size: 0.9rem;
      margin-top: 6px;
    }

    /* Card adjustments for responsiveness */
    .plan-card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 25px;
      width: 100%;
      max-width: 320px;
      flex: 1 1 260px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
      position: relative;
      box-sizing: border-box;
    }

    /* Use global .btn styles for consistency */
    .plan-card .btn {
      margin-top: 1rem;
      transition: transform 0.2s ease;
      min-height: 44px;
    }

    .plan-card .btn:hover {
      transform: translateY(-2px);
    }

    .plan-card .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* Responsive rules */
    @media (max-width: 768px) {
      .plans-container {
        gap: 16px;
        margin: 24px;
        padding: 0 12px;
      }

      .plan-card {
        padding: 20px;
        max-width: 380px;
      }

      h1 {
        font-size: 1.6rem;
        margin-top: 24px;
      }
    }

    @media (max-width: 480px) {
      .plans-container {
        flex-direction: column;
        gap: 12px;
        margin: 16px;
        padding: 0 12px;
      }

      .plan-card {
        padding: 16px;
        border-radius: 8px;
        max-width: 100%;
      }

      .plan-price {
        font-size: 20px;
      }

      .badge {
        top: -8px;
        right: -8px;
        padding: 4px 8px;
        font-size: 11px;
      }

      .btn {
        padding: 0.85rem;
        font-size: 1rem;
      }
    }

    /* Loading Overlay & Cyclic Moving Dots */
    .loading-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(5px);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.3s ease, visibility 0.3s ease;
    }

    .loading-overlay.active {
        opacity: 1;
        visibility: visible;
    }

    .loading-dots {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 120px;
        height: 30px;
        position: relative;
    }

    .loading-dots div {
        position: absolute;
        width: 12px;
        height: 12px;
        background: #3b82f6; /* Blue */
        border-radius: 50%;
        animation: cyclic-move 1.6s infinite cubic-bezier(0.4, 0, 0.2, 1);
    }

    .loading-dots div:nth-child(1) { animation-delay: 0s; }
    .loading-dots div:nth-child(2) { animation-delay: 0.4s; }
    .loading-dots div:nth-child(3) { animation-delay: 0.8s; }
    .loading-dots div:nth-child(4) { animation-delay: 1.2s; }

    @keyframes cyclic-move {
        0% {
            left: 0%;
            transform: scale(0.6);
            opacity: 0;
            background-color: #3b82f6;
        }
        20% {
            opacity: 1;
            transform: scale(1);
        }
        80% {
            opacity: 1;
            transform: scale(1);
        }
        100% {
            left: 100%;
            transform: scale(0.6);
            opacity: 0;
            background-color: #1e3a8a;
        }
    }
  </style>

</head>

<body>
  <nav class="navbar">
    <div class="logo">
      <a onclick="history.back()">
        <i class="fas fa-arrow-left"></i>
      </a>
      <a>
        <img src="img/DSA.png" alt="Logo">
        <span>DSA Enterprise</span>
      </a>
    </div>
  </nav>

  <h1>Choose Your Plan</h1>

  <div id="plans" class="plans-container">
    <!-- Plans will load here -->
  </div>

  <!-- ================= JS ================= -->
  <script type="module">
    import { RAZORPAY_KEY_ID } from './razorpayConfig.js';
    import { API_BASE_URL } from "./config.js";

    const plansContainer = document.getElementById("plans");

    // --- Loading Overlay Functions ---
    const loadingOverlay = document.getElementById('loadingOverlay');
    function showLoader() {
        if (loadingOverlay) loadingOverlay.classList.add('active');
    }
    function hideLoader() {
        if (loadingOverlay) loadingOverlay.classList.remove('active');
    }

    // If redirected with ?mobile=, persist it to localStorage for the subscribe flow
    const params = new URLSearchParams(window.location.search);
    const incomingMobile = params.get('mobile');
    if (incomingMobile) localStorage.setItem('userMobileNumber', incomingMobile);

    async function loadPlans() {
      let plans = [];
      try {
        showLoader();
        const res = await fetch(`${API_BASE_URL}/api/plans`);
        plans = await res.json();
      } catch (err) {
        console.error("Error loading plans:", err);
      } finally {
        hideLoader();
      }

      plansContainer.innerHTML = "";

      const baselineMonthlyPlan = plans.find(p => p.duration === 1 && p.interval === "monthly");
      const baselineMonthlyPrice = baselineMonthlyPlan ? baselineMonthlyPlan.price : null;

      plans.forEach(plan => {
        const card = document.createElement("div");
        card.className = "plan-card";

        if (plan.planType === "YEARLY") {
          card.innerHTML += `<div class="badge">Most Popular Plan</div>`;
        }

        const monthsTotal = plan.interval === 'yearly' ? (plan.duration * 12) : plan.duration;
        const originalPrice = baselineMonthlyPrice ? baselineMonthlyPrice * monthsTotal : plan.price;
        const discountedPrice = plan.price;

        // Show interval label based on plan duration/interval
        const intervalLabel = (plan.interval === 'monthly')
          ? (plan.duration > 1 ? `per ${plan.duration} month${plan.duration > 1 ? 's' : ''}` : ' / month')
          : (plan.duration > 1 ? `per ${plan.duration} year${plan.duration > 1 ? 's' : ''}` : ' / yr');

        const freeMonths = baselineMonthlyPrice ? Math.max(0, Math.round((originalPrice - discountedPrice) / baselineMonthlyPrice)) : 0;
        const buyMonths = Math.max(monthsTotal - freeMonths, 0);
        const promoText = plan.description ? plan.description : (freeMonths >= 1 ? `Buy ${buyMonths} month${buyMonths > 1 ? 's' : ''} get ${freeMonths} month${freeMonths > 1 ? 's' : ''} free.` : '');

        card.innerHTML += `
        <h2>${plan.name}</h2>
        <div class="plan-price">
          <div class="price-block">
            ${discountedPrice < originalPrice ? `<span class="original-price">&#8377;${originalPrice.toLocaleString('en-IN')}</span>` : ''}
            <span class="discounted-price">&#8377;${discountedPrice.toLocaleString('en-IN')}</span>
            <span class="price-interval"> ${intervalLabel}</span>
          </div>
        </div>
        ${promoText ? `<div class="promo-text">${promoText}</div>` : ''}
        <button class="btn">Subscribe</button>
      `;

        const btn = card.querySelector(".btn");
        btn.addEventListener("click", () => subscribe(plan.planType, btn));

        plansContainer.appendChild(card);
      });
    }

    async function subscribe(planType, btn) {
      btn.disabled = true;
      btn.innerText = "Processing...";

      // Support both keys depending on where we saved it
      const mobileNumber = localStorage.getItem("userMobileNumber") || localStorage.getItem("mobileNumber");
      if (!mobileNumber) {
        alert("Please login or register first");
        btn.disabled = false;
        btn.innerText = "Subscribe";
        return;
      }

      let data;
      try {
        showLoader();
        const res = await fetch(`${API_BASE_URL}/api/payment/create-subscription`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ mobileNumber, planType }),
        });

        data = await res.json();
        if (!res.ok) {
          alert(data.message || "Subscription failed");
          btn.disabled = false;
          btn.innerText = "Subscribe";
          return;
        }
      } catch (err) {
        console.error("Subscription error:", err);
        alert("An error occurred during subscription checkout.");
        btn.disabled = false;
        btn.innerText = "Subscribe";
        return;
      } finally {
        hideLoader();
      }

      const rzp = new Razorpay({
        key: RAZORPAY_KEY_ID,
        subscription_id: data.subscriptionId,
        name: "DSA Enterprise",
        description: "Subscription Payment",
        handler: function (response) {
          alert("Payment successful! Please login to continue.");
          window.location.href = "rentLogin.html";
        },
      });

      rzp.open();
    }

    loadPlans();
  </script>


  <!-- Loading Overlay -->
  <div id="loadingOverlay" class="loading-overlay">
    <div class="loading-dots">
      <div></div>
      <div></div>
      <div></div>
      <div></div>
    </div>
  </div>

</body>

</html>
